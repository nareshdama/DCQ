<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CadQuery — STL viewer (Three.js)</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        overflow: hidden;
        font-family: system-ui, sans-serif;
        background: #1a1a1e;
        color: #e8e8ec;
      }
      #hint {
        position: fixed;
        left: 12px;
        bottom: 12px;
        padding: 8px 12px;
        background: rgba(0, 0, 0, 0.55);
        border-radius: 8px;
        font-size: 13px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="hint">Drag to orbit · Scroll to zoom · Right-drag to pan</div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
